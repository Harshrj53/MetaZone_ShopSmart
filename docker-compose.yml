version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shopforge-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopforge}
      MYSQL_USER: ${MYSQL_USER:-shopforge_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shopforge_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopforge-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend and Frontend will be added here in Phase 10
  
volumes:
  mysql_data:
  redis_data:
